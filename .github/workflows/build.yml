name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 依存パッケージのインストール
        run: npm install

      - name: EXEのビルド
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ビルド成果物をアップロード（確認用）
        uses: actions/upload-artifact@v4
        with:
          name: mhxx-snipe-exe
          path: dist/*.exe
          retention-days: 30

      - name: GitHub Releasesに公開
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "MHXX護石スナイプツール v1.0.${{ github.run_number }}"
          body: "自動ビルド: ${{ github.sha }}"
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
